<svg width="1600" height="520" viewBox="0 0 1600 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AEGIS Design System banner</title>
  <desc id="desc">Futuristic tactical banner for the AEGIS Design System project.</desc>
  <defs>
    <linearGradient id="bg" x1="140" y1="60" x2="1460" y2="460" gradientUnits="userSpaceOnUse">
      <stop stop-color="#040608"/>
      <stop offset="0.55" stop-color="#081018"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="accent" x1="226" y1="120" x2="1310" y2="380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00F3FF"/>
      <stop offset="0.5" stop-color="#34D5E5"/>
      <stop offset="1" stop-color="#0097A7"/>
    </linearGradient>
    <linearGradient id="warm" x1="1120" y1="118" x2="1426" y2="192" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FACC15"/>
      <stop offset="1" stop-color="#FF7A00"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" stroke="#10313A" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="520" rx="24" fill="url(#bg)"/>
  <rect width="1600" height="520" rx="24" fill="url(#grid)" opacity="0.55"/>

  <path d="M94 90H320" stroke="#00F3FF" stroke-width="4" opacity="0.9"/>
  <path d="M94 90V178" stroke="#00F3FF" stroke-width="4" opacity="0.9"/>
  <path d="M1506 430H1280" stroke="#00F3FF" stroke-width="4" opacity="0.9"/>
  <path d="M1506 430V342" stroke="#00F3FF" stroke-width="4" opacity="0.9"/>

  <rect x="94" y="92" width="1412" height="336" rx="16" stroke="#17323A" stroke-width="2"/>
  <rect x="118" y="116" width="1364" height="288" rx="10" fill="#07111A" fill-opacity="0.58" stroke="#143640"/>

  <circle cx="1272" cy="160" r="64" fill="#00F3FF" opacity="0.08"/>
  <circle cx="1272" cy="160" r="42" fill="#00F3FF" opacity="0.1"/>
  <circle cx="1272" cy="160" r="18" fill="#00F3FF" opacity="0.8" filter="url(#glow)"/>

  <path d="M1160 160H1384" stroke="#1F5F69" stroke-width="2"/>
  <path d="M1272 48V272" stroke="#1F5F69" stroke-width="2"/>

  <text x="146" y="156" fill="#00F3FF" font-family="JetBrains Mono, monospace" font-size="20" letter-spacing="8">AEGIS // DESIGN SYSTEM</text>
  <text x="146" y="248" fill="url(#accent)" font-family="Orbitron, Arial, sans-serif" font-size="84" font-weight="700" letter-spacing="10">TACTICAL UI</text>
  <text x="146" y="322" fill="#CBD5E1" font-family="Space Grotesk, Arial, sans-serif" font-size="30" font-weight="500" letter-spacing="1.2">
    Foundations, components, Storybook docs, accessibility, visual tests.
  </text>

  <rect x="146" y="356" width="222" height="34" rx="17" fill="#06141A" stroke="#1D4D57"/>
  <circle cx="170" cy="373" r="6" fill="#00F3FF"/>
  <text x="188" y="380" fill="#E2F9FF" font-family="JetBrains Mono, monospace" font-size="16" letter-spacing="2">REACT 19 READY</text>

  <rect x="390" y="356" width="210" height="34" rx="17" fill="#141205" stroke="#5E4A12"/>
  <circle cx="414" cy="373" r="6" fill="#FACC15"/>
  <text x="432" y="380" fill="#FFF6D5" font-family="JetBrains Mono, monospace" font-size="16" letter-spacing="2">STORYBOOK 10</text>

  <rect x="622" y="356" width="226" height="34" rx="17" fill="#190B12" stroke="#6B1B30"/>
  <circle cx="646" cy="373" r="6" fill="#FF003C"/>
  <text x="664" y="380" fill="#FFE0E8" font-family="JetBrains Mono, monospace" font-size="16" letter-spacing="2">CHROMATIC VRT</text>
</svg>
